name: Volcarus Scheduled Report

on:
  workflow_dispatch:
    inputs:
      category:
        description: "Market category to scan"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - nba
          - crypto
          - weather
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      SCAN_CATEGORY: ${{ github.event.inputs.category || 'all' }}

    steps:
      - name: Post emergency report to Discord
        shell: python
        run: |
          import json
          import os
          import urllib.request
          from datetime import datetime, timezone

          webhook = os.environ.get("DISCORD_WEBHOOK_URL", "")
          webhook = webhook.replace("https://discordapp.com/", "https://discord.com/")
          category = os.environ.get("SCAN_CATEGORY", "all")
          now = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")

          if not webhook:
              raise SystemExit("DISCORD_WEBHOOK_URL secret is missing")

          body = "\n".join([
              "**Volcarus Emergency Scheduled Report**",
              f"Generated: {now}",
              f"Category: {category}",
              "",
              "**Executive Summary**",
              "GitHub scheduled mode is online.",
              "",
              "**Actionable Watches**",
              "No qualified setups found yet. Full scanner code still needs to be uploaded to this repo.",
              "",
              "**Data Limitations**",
              "- Emergency workflow is running.",
              "- Trading is disabled.",
              "- This is not the full EC2 slash-command bot.",
              "",
              "**System Health**",
              "Trading disabled: True."
          ])

          req = urllib.request.Request(
              webhook,
              data=json.dumps({"content": body}).encode("utf-8"),
              headers={
                  "Content-Type": "application/json",
                  "User-Agent": "volcarus-analysis-desk/0.1"
              },
              method="POST",
          )

          with urllib.request.urlopen(req, timeout=20) as response:
              print("Discord post status:", response.status)
